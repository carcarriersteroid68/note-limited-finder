name: Build & Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Package extension as zip
        run: |
          cd build/chrome-mv3-prod
          zip -r ../../note-limited-finder-${{ github.event.release.tag_name }}.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: note-limited-finder-${{ github.event.release.tag_name }}.zip
